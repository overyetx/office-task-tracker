name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '**/*.md'
      - 'Screenshots/**'
      - '.gitignore'
      - '.antigravityignore'
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '**/*.md'
      - 'Screenshots/**'
      - '.gitignore'
      - '.antigravityignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Publish
      run: dotnet publish --configuration Release --output ./OfficeTaskTracker -p:PublishReadyToRun=false -p:PublishSingleFile=true --self-contained false -p:IncludeNativeLibrariesForSelfExtract=true

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OfficeTaskTracker-Build
        path: ./OfficeTaskTracker/

    - name: Zip Artifact
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: Compress-Archive -Path ./OfficeTaskTracker -DestinationPath ./OfficeTaskTracker.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: OfficeTaskTracker.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
